services:
  postgres:
    image: postgres:17.5-bullseye
    container_name: customer-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: customer_db
    ports:
      - "5434:5432"
    volumes:
      - customer_db_data:/var/lib/postgresql/data

volumes:
  customer_db_data:
